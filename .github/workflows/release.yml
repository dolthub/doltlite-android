name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
    - uses: actions/checkout@v4

    # Build against the matching doltlite engine ref: the release tag on a tag
    # push, or master for a manual (workflow_dispatch) smoke build. doltlite is
    # public, so a plain anonymous clone avoids the cross-repo auth failure
    # actions/checkout hits with this repo's scoped GITHUB_TOKEN.
    - name: Checkout doltlite engine
      run: |
        ref="${{ github.ref_type == 'tag' && github.ref_name || 'master' }}"
        git clone --depth=1 --branch "$ref" https://github.com/dolthub/doltlite doltlite

    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - uses: gradle/actions/setup-gradle@v4

    - name: Build doltlite amalgamation
      working-directory: doltlite
      run: |
        ./configure
        make sqlite3.c sqlite3.h sqlite3ext.h

    - name: Cross-compile libdoltlite for Android ABIs
      run: |
        bash scripts/build-libs.sh "$PWD/doltlite" "${VERSION#v}" \
          "${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"

    - name: Assemble AAR
      run: gradle assembleRelease -PdoltliteVersion="${VERSION#v}" --no-daemon

    # Guard: the AAR must actually contain the binding classes and a native lib.
    # An empty classes.jar still assembles cleanly, so check contents explicitly.
    - name: Verify AAR contents
      run: |
        aar="$(find build/outputs/aar -name '*-release.aar' | head -1)"
        echo "inspecting $aar"
        unzip -p "$aar" classes.jar > /tmp/classes.jar
        if ! unzip -l /tmp/classes.jar | grep -q 'com/dolthub/doltlite/Doltlite.class'; then
          echo "ERROR: classes.jar is missing com/dolthub/doltlite/Doltlite.class"
          unzip -l /tmp/classes.jar
          exit 1
        fi
        if ! unzip -l "$aar" | grep -q 'jni/arm64-v8a/libdoltlite.so'; then
          echo "ERROR: AAR is missing jni/arm64-v8a/libdoltlite.so"
          exit 1
        fi
        echo "AAR contains binding classes and native libs"

    # Acceptance test: drive the AAR's actual compiled binding classes over JNA
    # against a host-built libdoltlite (the Android-ABI .so's can't load on the
    # x86_64 runner, but the binding logic + C API are identical). Catches
    # runtime breakage the assembly/content guards can't.
    - name: Runtime acceptance test
      run: |
        sudo apt-get update -qq && sudo apt-get install -y -qq zlib1g-dev
        mkdir -p native out
        cc -O2 -fPIC -DNDEBUG -DSQLITE_ENABLE_MATH_FUNCTIONS -DSQLITE_THREADSAFE=1 \
           -DDOLTLITE_PROLLY=1 -DDOLTLITE_VERSION='"smoke"' \
           -DSQLITE_ENABLE_FTS5 -DSQLITE_ENABLE_RTREE -DSQLITE_ENABLE_DBSTAT_VTAB \
           -DSQLITE_HAVE_ZLIB=1 -Wno-comment \
           -shared doltlite/sqlite3.c -lz -o native/libdoltlite.so
        aar="$(find build/outputs/aar -name '*-release.aar' | head -1)"
        unzip -p "$aar" classes.jar > classes.jar
        curl -fsSL -o jna.jar https://repo1.maven.org/maven2/net/java/dev/jna/jna/5.14.0/jna-5.14.0.jar
        curl -fsSL -o kotlin-stdlib.jar https://repo1.maven.org/maven2/org/jetbrains/kotlin/kotlin-stdlib/2.0.20/kotlin-stdlib-2.0.20.jar
        javac -cp classes.jar:jna.jar -d out scripts/RuntimeSmoke.java
        java -Djna.library.path="$PWD/native" -cp classes.jar:jna.jar:kotlin-stdlib.jar:out RuntimeSmoke

    - name: Create release with the AAR
      if: github.event_name != 'workflow_dispatch'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        version="${VERSION#v}"
        aar="$(find build/outputs/aar -name '*-release.aar' | head -1)"
        cp "$aar" "doltlite-android-${version}.aar"
        if gh release view "${VERSION}" >/dev/null 2>&1; then
          gh release upload "${VERSION}" "doltlite-android-${version}.aar" --clobber
        else
          gh release create "${VERSION}" "doltlite-android-${version}.aar" \
            --title "doltlite-android ${version}" --generate-notes
        fi

    - name: Publish to Maven Central
      if: github.event_name != 'workflow_dispatch'
      env:
        # The vanniktech plugin reads credentials + the in-memory signing key
        # from these ORG_GRADLE_PROJECT_* env vars.
        ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
        ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
        ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
      run: |
        # The secrets context can't be used in an `if:`, so gate here. Without
        # the Central Portal / signing secrets the AAR is still on the GitHub
        # release. publishAndReleaseToMavenCentral uploads and auto-releases.
        if [ -z "$ORG_GRADLE_PROJECT_mavenCentralUsername" ] || [ -z "$ORG_GRADLE_PROJECT_signingInMemoryKey" ]; then
          echo "Maven Central secrets not set; skipping publish (AAR is on the release)."
          exit 0
        fi
        gradle publishAndReleaseToMavenCentral \
          -PdoltliteVersion="${VERSION#v}" --no-daemon --no-configuration-cache
